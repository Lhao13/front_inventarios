name: front_inventarios
description: "App de inventarios para el proyecto integrador"

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.12.2
  geolocator: ^14.0.2
  mobile_scanner: ^7.2.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  sqflite: ^2.4.2
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.3
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.6

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
    - assets/onboarding/
